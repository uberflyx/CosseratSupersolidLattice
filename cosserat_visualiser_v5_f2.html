        /* Quark at +sep, antiquark at -sep along mesonArm0 */
        var pos0 = mesonArm0.clone().multiplyScalar(sep);
        var pos1 = mesonArm1.clone().multiplyScalar(sep);

        /* Each partial = 2 back-to-back semi-infinite segments = infinite line */
        segs.push({ origin: pos0, dir: lineDir,    burg: burgFrom(lineDir), sp:  1 });
        segs.push({ origin: pos0, dir: lineDirNeg, burg: burgFrom(lineDirNeg), sp:  1 });
        segs.push({ origin: pos1, dir: lineDir,    burg: burgFrom(lineDir), sp: -1 });
        segs.push({ origin: pos1, dir: lineDirNeg, burg: burgFrom(lineDirNeg), sp: -1 });

        if(partKey === 'rho' || partKey === 'omega') {
            /* Crossed fault: second pair on Plane 2 = (11̄1).
               Plane 2's hex ring [1,7,11,2,4,8] has its diameter along
               (1,0,1)/√2, NOT along arm1.  OFS[7]↔OFS[4] are the
               diametrically opposite pair at distance 2.0. */
            var crossSep2 = new THREE.Vector3(1,0,1).normalize().applyQuaternion(qUp);
            var lineDir2 = new THREE.Vector3().crossVectors(yhat, crossSep2).normalize();
            var lineDir2N = lineDir2.clone().negate();
            var pos2 = crossSep2.clone().multiplyScalar(sep);       /* sep = cS, full ring extent */
            var pos3 = crossSep2.clone().negate().multiplyScalar(sep);
            var sp2 = (partKey === 'rho') ? 0.7 : 1.0;
            segs.push({ origin: pos2, dir: lineDir2,  burg: burgFrom(lineDir2), sp:  sp2 });
            segs.push({ origin: pos2, dir: lineDir2N, burg: burgFrom(lineDir2N), sp:  sp2 });
            segs.push({ origin: pos3, dir: lineDir2,  burg: burgFrom(lineDir2), sp: -sp2 });
            segs.push({ origin: pos3, dir: lineDir2N, burg: burgFrom(lineDir2N), sp: -sp2 });
        }
    }
    return segs;
}

function getQuarkArms(partKey) {
    var p = particles[partKey];
    if(p.nQ === 3) {
        return [arm0, arm1, arm2];
    }
    if(p.nQ === 1) {
        /* Leptons: single infinite dislocation line along arm0.
           Two arms in opposite directions to show the full line
           (sp=[1,1,0] so both halves are active, arm2 is dummy). */
        var neg = arm0.clone().negate();
        return [arm0, neg, new THREE.Vector3(0,1,0)];
    }
    /* Mesons: dipolar strain field, two arms in opposite directions.
       Third arm direction is a dummy (sp[2]=0 zeroes its contribution). */
    return [mesonArm0, mesonArm1, new THREE.Vector3(0,1,0)];
}

/* ================================================================
   INIT
   ================================================================ */
window.addEventListener('load', function(){
    scene = new THREE.Scene();
    scene.background = new THREE.Color(0xffffff);

    renderer = new THREE.WebGLRenderer({antialias:true, preserveDrawingBuffer:true});
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setScissorTest(true);
    renderer.sortObjects = true;
    document.body.appendChild(renderer.domElement);

    scene.add(new THREE.AmbientLight(0xffffff, 0.8));
    var d1=new THREE.DirectionalLight(0xffffff,0.6); d1.position.set(5,5,5); scene.add(d1);
    var d2=new THREE.DirectionalLight(0xffffff,0.3); d2.position.set(-5,-5,-5); scene.add(d2);
    scene.add(new THREE.PointLight(0xffffff,0.6,15));

    /* Dislocation segment cylinders — red for spin +, blue for spin − */
    var armLen = cS * 1.3;
    var armRad = 0.03;
    armLines = [];
    for(var ai=0; ai<8; ai++){
        var cyl = new THREE.Mesh(
            new THREE.CylinderGeometry(armRad, armRad, armLen, 8),
            new THREE.MeshBasicMaterial({color:0xff0000})
        );
        cyl.visible = false;
        scene.add(cyl);
        armLines.push(cyl);
    }

    /* Proton charge radius circle: R_p = 0.300ℓ in the (111) plane (xz after qUp) */
    var RP_RADIUS = 0.300;
    var rpGeo = new THREE.RingGeometry(RP_RADIUS - 0.01, RP_RADIUS + 0.01, 64);
    rpCircle = new THREE.Mesh(rpGeo, new THREE.MeshBasicMaterial({color:0x00AA00, side:THREE.DoubleSide}));
    /* Rotate from xy default to xz plane (the (111) plane after qUp) */
    rpCircle.rotation.x = -Math.PI/2;
    rpCircle.visible = false;
    scene.add(rpCircle);

    setupCams();
    controls = new THREE.OrbitControls(cP, document.getElementById('pz'));
    controls.enableDamping=false;
    controls.minDistance=3; controls.maxDistance=20;

    buildAxes();
    buildVolumeMesh();
    buildOverlay();

    /* Build initial cage (proton) */
    switchParticle('proton');

    drawCB();

    /* Event listeners */
    document.getElementById('ps').addEventListener('change', function(e){
        switchParticle(e.target.value);
        needsStaticUpdate=true;
    });
    document.getElementById('fs').addEventListener('change', function(e){
        var v = e.target.value;
        if(v === 'spheres'){
            volMesh.visible = false;
            if(currentCageGroup) {
                currentCageGroup.userData.nodeMeshes.forEach(function(m){m.visible = true;});
            }
            drawCB();
        } else {
            volMesh.visible = true;
            if(currentCageGroup) {
                currentCageGroup.userData.nodeMeshes.forEach(function(m){m.visible = false;});
            }
            mU.value = (v==='strain') ? 0.0 : (v==='displacement') ? 5.0 : (v==='strainenergy') ? 3.0 : (v==='cosserat') ? 4.0 : (v==='coulomb') ? 1.0 : 2.0;
            updateVolR();
            drawCB();
        }
        needsStaticUpdate=true;
    });
    document.getElementById('ws').addEventListener('input', function(e){
        var v = parseFloat(e.target.value);
        wU.value = v*v;
        document.getElementById('wv').textContent = v.toFixed(3);
        /* Recompute peak field for new w */
        updateFieldScale();
        drawCB();
        needsStaticUpdate=true;
    });
    document.getElementById('xb').addEventListener('click', exportHR);
    document.getElementById('armToggle').addEventListener('change', function(e){
        var show = e.target.checked;
        if(armLines){
            var segs = getSegments(currentPartKey);
            var armLen = cS * 1.3;
            for(var ai=0; ai<8; ai++){
                if(show && ai < segs.length && segs[ai].sp !== 0){
                    var d = segs[ai].dir;
                    var o = segs[ai].origin;
                    armLines[ai].visible = true;
                    armLines[ai].material.color.set(segs[ai].sp > 0 ? 0xDD2222 : 0x2244DD);
                    armLines[ai].quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), d);
                    armLines[ai].position.copy(d).multiplyScalar(armLen/2).add(o);
                } else {
                    armLines[ai].visible = false;
                }
            }
        }
        needsStaticUpdate=true;
    });
    document.getElementById('posOnly').addEventListener('change', function(e){
        volMesh.material.uniforms.uPosOnly.value = e.target.checked ? 1.0 : 0.0;
        needsStaticUpdate=true;
    });
    document.getElementById('rpToggle').addEventListener('change', function(e){
        if(rpCircle) rpCircle.visible = e.target.checked;
        needsStaticUpdate=true;
    });
    document.getElementById('wireToggle').addEventListener('change', function(e){
        cageVisible = e.target.checked;
        if(currentCageGroup) updateCageVisibility();
        needsStaticUpdate=true;
    });
    window.addEventListener('resize', onRz);
    anim();
});

/* ================================================================
   VOLUME MESH (shared across all particles)
   ================================================================ */
function buildVolumeMesh() {
    var R = STRAIN_R;
    var p = particles.proton;
    var qPos = getQuarkPositions('proton');
    var qArms = getQuarkArms('proton');

    /* Initialise segment arrays (max 8 segments) */
    var initSegO = [], initSegD = [], initSegB = [];
    var initSegS = [];
    for(var i=0;i<8;i++){
        initSegO.push(new THREE.Vector3(0,0,0));
        initSegD.push(new THREE.Vector3(1,0,0));
        initSegB.push(new THREE.Vector3(0,0,1));
        initSegS.push(0.0);
    }

    /* Initialise 32-element arrays for legacy node positions */
    var initNP = [];
    var initNS = [];
    for(var i=0;i<32;i++){
        initNP.push(new THREE.Vector3(0,0,0));
        initNS.push(0.0);
    }

    var unis = {
        uCP:  {value: new THREE.Vector3()},
        /* Generic segment arrays */
        uSegO: {value: initSegO},
        uSegD: {value: initSegD},
        uSegB: {value: initSegB},
        uSegS: {value: initSegS},
        uNSeg: {value: 3.0},
        /* Coulomb mode (kept separate) */
        uCh:  {value: new THREE.Vector3(p.ch[0], p.ch[1], p.ch[2])},
        uQ0:  {value: qPos[0].clone()},
        uQ1:  {value: qPos[1].clone()},
        uQ2:  {value: qPos[2].clone()},
        uW2:  {value: 0.783*0.783},
        uR:   {value: R},
        uMode:{value: 0.0},
        uSteps:{value: LIVE_STEPS},
        /* Legacy node-based uniforms (kept for Coulomb/fallback) */
        uNP:  {value: initNP},
        uNS:  {value: initNS},
        uNC:  {value: 0.0},
        uFT:  {value: 0.0},
        uFieldScale: {value: 1.0},
        uPosOnly: {value: 0.0},
        uCoreType: {value: 0.0},
        uRibSep: {value: new THREE.Vector3(1,0,0)},
        uRibHalf: {value: 0.0},
        uRibOn: {value: 0.0}
    };

    wU  = unis.uW2;
    mU  = unis.uMode;
    stU = unis.uSteps;

    var vG = new THREE.SphereGeometry(R, 32, 32);
    var vM = new THREE.ShaderMaterial({
        vertexShader: vS, fragmentShader: fS_code,
        uniforms: unis, transparent: true,
        side: THREE.BackSide, depthWrite: false
    });
    volMesh = new THREE.Mesh(vG, vM);
    volMesh.renderOrder = 2;
    scene.add(volMesh);
}

function updateVolR(){
    var isC = (mU.value > 0.5 && mU.value < 2.5);  /* modes 1,2 = Coulomb */
    var p = particles[currentPartKey];
    var pR = p.strainR || STRAIN_R;
    var R = isC ? Math.max(COULOMB_R, pR + 0.5) : pR;
    volMesh.geometry.dispose();
    volMesh.geometry = new THREE.SphereGeometry(R, 32, 32);
    volMesh.material.uniforms.uR.value = R;
}

/* ================================================================
   CAGE VISIBILITY TOGGLE
   Hides/shows all cage geometry (wireframe edges, face polygons,
   bond lines) while leaving node spheres and the volume mesh alone.
   ================================================================ */
function updateCageVisibility() {
    if(!currentCageGroup) return;
    var nodes = new Set(currentCageGroup.userData.nodeMeshes || []);
    currentCageGroup.children.forEach(function(child){
        if(!nodes.has(child)){
            child.visible = cageVisible;
        }
    });
}

/* ================================================================
   PARTICLE SWITCHING
   ================================================================ */
function switchParticle(partKey) {
    currentPartKey = partKey;
    var p = particles[partKey];

    /* Remove old cage group */
    if(currentCageGroup) {
        scene.remove(currentCageGroup);
        currentCageGroup.traverse(function(c){
            if(c.geometry) c.geometry.dispose();
            if(c.material) {
                if(Array.isArray(c.material)) c.material.forEach(function(m){m.dispose();});
                else c.material.dispose();
            }
        });
    }

    /* Reset Rp circle: hide and uncheck on every particle switch */
    if(rpCircle) rpCircle.visible = false;
    document.getElementById('rpToggle').checked = false;

    /* Build new cage */
    currentCageGroup = buildCageGroup(p.cage);
    scene.add(currentCageGroup);

    /* ── Update volume mesh uniforms ── */
    var u = volMesh.material.uniforms;
    var qPos = getQuarkPositions(partKey);

    u.uCh.value = new THREE.Vector3(p.ch[0], p.ch[1], p.ch[2]);
    u.uQ0.value = qPos[0].clone();
    u.uQ1.value = qPos[1].clone();
    u.uQ2.value = qPos[2].clone();

    /* ── Populate generic segment arrays ── */
    var segs = getSegments(partKey);
    for(var i=0; i<8; i++){
        if(i < segs.length){
            u.uSegO.value[i].copy(segs[i].origin);
            u.uSegD.value[i].copy(segs[i].dir);
            u.uSegB.value[i].copy(segs[i].burg);
            u.uSegS.value[i] = segs[i].sp;
        } else {
            u.uSegO.value[i].set(0,0,0);
            u.uSegD.value[i].set(1,0,0);
            u.uSegB.value[i].set(0,0,1);
            u.uSegS.value[i] = 0.0;
        }
    }
    u.uNSeg.value = segs.length;
    u.uCoreType.value = (p.coreType !== undefined) ? p.coreType : 0.0;

    /* ── Node-based field for particles where segment model is insufficient ──
       Strange baryons have Y-junction segments PLUS hex-cap extensions that
       extend beyond the cuboctahedron — node field shows the full cluster.
       All other particles now use the physical segment-based strain. */
    var nodePositions = [];
    var nodeSigns = [];
    var fieldType = 0.0;  /* 0 = segment-based, 1 = node-based */

    if(partKey === 'lambda' || partKey === 'sigma_plus' || partKey === 'sigma_zero' || partKey === 'sigma_minus' || partKey === 'xi_zero' || partKey === 'xi_minus' || partKey === 'omega_minus') {
        /* Strange baryons: cuboctahedron + hex-cap extension nodes.
           Uses node-based field to show the extended cluster shape. */
        fieldType = 1.0;
        var EXTS_ALL = [EXT0, EXT1, EXT2];
        var BILS_ALL = [EXT0_BIL, EXT1_BIL, EXT2_BIL];
        var sArms = [];
        var hasBil = false;

        if(partKey === 'lambda')      { sArms = [0]; }
        else if(partKey === 'sigma_plus' || partKey === 'sigma_zero' || partKey === 'sigma_minus') { sArms = [0]; hasBil = true; }
        else if(partKey === 'xi_zero' || partKey === 'xi_minus')    { sArms = [0, 1]; }
        else if(partKey === 'omega_minus')      { sArms = [0, 1, 2]; hasBil = true; }

        /* Centre node (Omega has no centre — triple bilayer) */
        if(partKey !== 'omega_minus'){
            nodePositions.push(new THREE.Vector3(0,0,0));
            nodeSigns.push(1.5);
        }
        /* 12 cuboctahedral vertices */
        for(var i=0;i<12;i++){
            nodePositions.push(OFS[i].clone().applyQuaternion(qUp));
            nodeSigns.push(1.0);
        }
        /* Extension nodes for each strange arm */
        for(var sa=0; sa<sArms.length; sa++){
            var ai = sArms[sa];
            for(var ei=0; ei<3; ei++){
                nodePositions.push(EXTS_ALL[ai][ei].clone().applyQuaternion(qUp));
                nodeSigns.push(1.2); /* slightly brighter than shell */
            }
            if(hasBil){
                nodePositions.push(BILS_ALL[ai].clone().applyQuaternion(qUp));
                nodeSigns.push(1.0);
            }
        }
    }

    if(partKey === 'f2') {
        /* ── f₂(1270): analytic microrotation curvature mode ──
           fieldType = 2.0 triggers the analytic Y₂⁰ × radial_envelope
           shader branch instead of the node-blob field.
           The quadrupole axis is crystal [001] rotated into the viewing frame. */
        fieldType = 2.0;
        /* Store quadrupole axis in uRibSep (reused; no ribbon for phonons) */
        u.uRibSep.value = new THREE.Vector3(0,0,1).applyQuaternion(qUp).normalize();
    }

    /* Scale node positions to match cS-scaled cage */
    if(fieldType > 0.5){
        for(var i=0;i<nodePositions.length;i++){
            nodePositions[i].multiplyScalar(cS);
        }
    }

    /* Write node arrays */
    var uNP = u.uNP.value;
    var uNS = u.uNS.value;
    for(var i=0;i<32;i++){
        if(i < nodePositions.length){
            uNP[i].copy(nodePositions[i]);
            uNS[i] = nodeSigns[i];
        } else {
            uNP[i].set(0,0,0);
            uNS[i] = 0.0;
        }
    }
    u.uNC.value = nodePositions.length;
    u.uFT.value = fieldType;

    /* ── Ribbon uniforms for mesons ── */
    if(p.nQ === 2 && fieldType < 0.5){
        /* Segment-based meson: enable ribbon between quark positions.
           The ribbon is a constant-strain slab in the (111) plane between 
           the two partial dislocation lines. */
        u.uRibOn.value = 1.0;
        u.uRibSep.value.copy(mesonArm0);
        var sep = 0.5;                                             /* pion, pion0: cell pair */
        if(partKey === 'kaon' || partKey === 'kaon0') sep = cS;    /* hex cap */
        if(partKey === 'eta') sep = cS;                             /* hex bilayer */
        if(partKey === 'kstar' || partKey === 'phi') sep = cS;     /* full shell */
        if(partKey === 'rho' || partKey === 'omega') sep = cS;     /* crossed fault Plane 1 */
        /* Note: rho/omega have a SECOND ribbon on Plane 2 (along crossSep2).
           The shader currently supports only one ribbon; the second plane's
           contribution comes from the segment strain, not the ribbon slab.
           This is a known approximation. */
        u.uRibHalf.value = sep;
    } else {
        u.uRibOn.value = 0.0;
    }

    /* ── Compute peak field for colourmap scaling ── */
    var peakField = 0.001;
    var wNow = parseFloat(document.getElementById('ws').value);
    var w2now = wNow * wNow;
    if(fieldType > 1.5){
        /* Analytic microrotation: peak of Y₂⁰ × (r²/σ²)exp(-r²/σ²)
           = 2.0 × (1/e) = 0.7358 at r = σ = √2 along the quadrupole axis. */
        peakField = 2.0 / Math.E;
    } else if(fieldType > 0.5 && nodePositions.length > 0){
        var testPts = [new THREE.Vector3(0,0,0)];
        for(var i=0;i<nodePositions.length;i++) testPts.push(nodePositions[i]);
        for(var ti=0;ti<testPts.length;ti++){
            var tp = testPts[ti];
            var f = 0;
            for(var j=0;j<nodePositions.length;j++){
                var dx = tp.x - nodePositions[j].x;
                var dy = tp.y - nodePositions[j].y;
                var dz = tp.z - nodePositions[j].z;
                f += nodeSigns[j] / (1.0 + (dx*dx+dy*dy+dz*dz)/w2now);
            }
            f = f / nodePositions.length;
            if(Math.abs(f) > peakField) peakField = Math.abs(f);
        }
    } else {
        var ct = (p.coreType !== undefined) ? p.coreType : 0;
        var nSeg = segs.length;
        if(ct < 0.5){
            peakField = 1.0 / (2.0 * wNow * nSeg);
        } else {
            peakField = 1.0 / (8.0 * wNow * nSeg);
        }
    }
    if(peakField < 0.001) peakField = 0.1;
    u.uFieldScale.value = 1.0 / peakField;

    /* Update rendering sphere radius for particles that extend beyond standard size */
    var pR = p.strainR || STRAIN_R;
    var fsMode = document.getElementById('fs').value;
    var isC = (fsMode === 'coulomb' || fsMode === 'coulomb2');
    var R = isC ? Math.max(COULOMB_R, pR + 0.5) : pR;
    volMesh.geometry.dispose();
    volMesh.geometry = new THREE.SphereGeometry(R, 32, 32);
    u.uR.value = R;

    volMesh.material.uniformsNeedUpdate = true;

    /* Show nodes or field depending on current mode */
    var fsVal = document.getElementById('fs').value;
    if(fsVal === 'spheres') {
        volMesh.visible = false;
        currentCageGroup.userData.nodeMeshes.forEach(function(m){m.visible = true;});
    } else {
        volMesh.visible = true;
        currentCageGroup.userData.nodeMeshes.forEach(function(m){m.visible = false;});
    }

    /* Update segment cylinders from segment list */
    if(armLines){
        var showArms = document.getElementById('armToggle').checked;
        var armLen = cS * 1.3;
        for(var ai=0; ai<8; ai++){
            if(showArms && ai < segs.length && segs[ai].sp !== 0){
                var d = segs[ai].dir;
                var o = segs[ai].origin;
                armLines[ai].visible = true;
                armLines[ai].material.color.set(segs[ai].sp > 0 ? 0xDD2222 : 0x2244DD);
                armLines[ai].quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0), d);
                armLines[ai].position.copy(d).multiplyScalar(armLen/2).add(o);
            } else {
                armLines[ai].visible = false;
            }
        }
    }

    /* Respect cage visibility toggle */
    updateCageVisibility();

    needsStaticUpdate = true;
}

/* ================================================================
   COLORBAR
   ================================================================ */
function drawCB(){
    var cbc=document.getElementById('cbc');
    var v=document.getElementById('fs').value;
    if(v==='spheres'){ cbc.style.display='none'; return; }
    cbc.style.display='flex';
    var cvs=document.getElementById('cb');
    var ctx=cvs.getContext('2d');
    var w=cvs.width,h=cvs.height;
    var mode=mU?mU.value:0;
    var isEnergy = (mode > 2.5 && mode < 3.5);
    var isCosserat = (mode > 3.5 && mode < 4.5);
    var isDisp = (mode > 4.5 && mode < 5.5);
    var isOverlap = (mode > 5.5);
    var isStrain = (mode < 0.5);
    var isCoul   = (mode > 0.5 && mode < 1.5);

    /* Compute peak PN strain: ε₀ = b/(2πw) = ℓ/(2πw) = 1/(2π·w/ℓ) */
    var wSlider = parseFloat(document.getElementById('ws').value);
    var eps0 = 1.0/(2.0*Math.PI*wSlider);

    if(isOverlap){
        document.getElementById('cbt').textContent = '+ε·γ';
        document.getElementById('cbb').textContent = '−ε·γ';
    } else if(isDisp){
        document.getElementById('cbt').textContent = '+b/2';
        document.getElementById('cbb').textContent = '−b/2';
    } else if(isCosserat){
        document.getElementById('cbt').textContent = 'U_Coss';
        document.getElementById('cbb').textContent = '0';
    } else if(isEnergy){
        document.getElementById('cbt').textContent = (eps0*eps0/4).toFixed(3);
        document.getElementById('cbb').textContent = '0';
    } else if(isStrain){
        document.getElementById('cbt').textContent = '+' + (eps0/2).toFixed(2);
        document.getElementById('cbb').textContent = '−' + (eps0/2).toFixed(2);
    } else if(isCoul){
        document.getElementById('cbt').textContent = '+φ';
        document.getElementById('cbb').textContent = '−φ';
    } else {
        document.getElementById('cbt').textContent = '+φ²';
        document.getElementById('cbb').textContent = '−φ²';
    }

    for(var y=0;y<h;y++){
        var t=1.0-y/h;
        var rgb = (isEnergy || isCosserat) ? hotJS(t) : jetJS(t);
        ctx.fillStyle='rgb('+Math.round(rgb[0]*255)+','+Math.round(rgb[1]*255)+','+Math.round(rgb[2]*255)+')';
        ctx.fillRect(0,y,w,1);
    }
}
function jetJS(t){
    t=Math.max(0,Math.min(1,t));
    return [
        Math.max(0,Math.min(1,1.5-Math.abs(4.0*t-3.0))),
        Math.max(0,Math.min(1,1.5-Math.abs(4.0*t-2.0))),
        Math.max(0,Math.min(1,1.5-Math.abs(4.0*t-1.0)))
    ];
}
function hotJS(t){
    t=Math.max(0,Math.min(1,t));
    return [
        Math.min(1, 2.0*t),
        Math.max(0, Math.min(1, 2.0*t - 1.0)),
        0
    ];
}

/* ================================================================
   CAMERAS
   ================================================================ */
function setupCams(){
    var a=window.innerWidth/window.innerHeight, hs=fS/2;
    c111=new THREE.OrthographicCamera(-hs*a,hs*a,hs,-hs,0.1,100);
    c111.position.set(0,10,0); c111.lookAt(0,0,0);
    c121=new THREE.OrthographicCamera(-hs*a,hs*a,hs,-hs,0.1,100);
    c121.position.set(0,0,10); c121.lookAt(0,0,0);
    c101=new THREE.OrthographicCamera(-hs*a,hs*a,hs,-hs,0.1,100);
    c101.position.set(10,0,0); c101.lookAt(0,0,0);
    cP=new THREE.PerspectiveCamera(42,a,0.1,100);
    cP.position.set(6,4,8); cP.lookAt(0,0,0);
}

/* ================================================================
   AXES
   ================================================================ */
function buildAxes(){
    var bs=5,ga=0.9;
    var g1=new THREE.GridHelper(bs,bs,0xBB44BB,0xBB44BB);
    g1.material.opacity=ga; g1.material.transparent=true; g1.position.y=-bs/2; scene.add(g1);
    var g2=new THREE.GridHelper(bs,bs,0xDD8800,0xDD8800);
    g2.material.opacity=ga; g2.material.transparent=true; g2.rotation.x=Math.PI/2; g2.position.z=-bs/2; scene.add(g2);
    var g3=new THREE.GridHelper(bs,bs,0x44BBBB,0x44BBBB);
    g3.material.opacity=ga; g3.material.transparent=true; g3.rotation.z=Math.PI/2; g3.position.x=-bs/2; scene.add(g3);
    var corner=new THREE.Vector3(-bs/2,-bs/2,-bs/2);
    function addA(dir,col){
        var sR=0.03,hR=0.12,hL=0.4,sL=bs-hL;
        var m=new THREE.MeshBasicMaterial({color:col});
        var sh=new THREE.Mesh(new THREE.CylinderGeometry(sR,sR,sL,12),m); sh.position.y=sL/2;
        var hd=new THREE.Mesh(new THREE.ConeGeometry(hR,hL,12),m); hd.position.y=sL+hL/2;
        var g=new THREE.Group(); g.add(sh); g.add(hd);
        g.quaternion.setFromUnitVectors(new THREE.Vector3(0,1,0),dir);
        g.position.copy(corner); scene.add(g);
    }
    addA(new THREE.Vector3(1,0,0),0xDD0000);
    addA(new THREE.Vector3(0,1,0),0x00BB00);
    addA(new THREE.Vector3(0,0,1),0x0000DD);
}

/* ================================================================
   RENDER
   ================================================================ */
function buildOverlay(){
    overlayScene = new THREE.Scene();
    /* Proton charge radius: R_p = 0.84 fm, ℓ = 2.82 fm → R_p/ℓ = 0.298 */
    var Rp = 0.84 / 2.82;
    var ringThick = 0.012;
    var ringGeo = new THREE.RingGeometry(Rp - ringThick, Rp + ringThick, 64);
    var ringMat = new THREE.MeshBasicMaterial({color:0x000000, side:THREE.DoubleSide, transparent:true, opacity:0.7});
    scaleRing = new THREE.Mesh(ringGeo, ringMat);
    overlayScene.add(scaleRing);

    /* Ortho camera matching the main cameras' coordinate system */
    overlayCam = new THREE.OrthographicCamera(-1,1,1,-1, 0.1, 10);
    overlayCam.position.set(0,0,5);
    overlayCam.lookAt(0,0,0);
}

function updateViewState(cam) {
    if(volMesh.visible) {
        volMesh.material.uniforms.uCP.value.copy(cam.position);
    }
    if(currentCageGroup) {
        var ud = currentCageGroup.userData;
        if(ud.lineUnisB) ud.lineUnisB.uCP.value.copy(cam.position);
        if(ud.lineUnisF) ud.lineUnisF.uCP.value.copy(cam.position);
        if(ud.lineUnisB2) ud.lineUnisB2.uCP.value.copy(cam.position);
        if(ud.lineUnisF2) ud.lineUnisF2.uCP.value.copy(cam.position);

        var tempPos = new THREE.Vector3();
        var viewDir = new THREE.Vector3();
        ud.nodeMeshes.forEach(function(m){
            m.getWorldPosition(tempPos);
            viewDir.subVectors(cam.position, tempPos);
            m.renderOrder = tempPos.dot(viewDir) < 0 ? 1 : 3;
        });
    }
}

function rV(cam,x,y,w,h,showOverlay){
    updateViewState(cam);
    renderer.setViewport(x,y,w,h);
    renderer.setScissor(x,y,w,h);
    renderer.render(scene,cam);
    /* Proton charge radius overlay (ortho viewports only, if Rp toggle checked) */
    if(showOverlay && overlayScene && document.getElementById('rpToggle').checked){
        var hs = fS/2;
        var aspect = w/h;
        overlayCam.left = -hs*aspect;
        overlayCam.right = hs*aspect;
        overlayCam.top = hs;
        overlayCam.bottom = -hs;
        overlayCam.updateProjectionMatrix();
        scaleRing.position.set(0, 0, 0);
        renderer.autoClear = false;
        renderer.clearDepth();
        renderer.render(overlayScene, overlayCam);
        renderer.autoClear = true;
    }
}

function anim(){
    requestAnimationFrame(anim);
    controls.update();
    stU.value = LIVE_STEPS;
    var hw=window.innerWidth/2, hh=window.innerHeight/2;

    if(needsStaticUpdate){
        rV(c111, 0, hh, hw, hh, true);
        rV(c121, hw, hh, hw, hh, true);
        rV(c101, 0, 0, hw, hh, true);
        needsStaticUpdate = false;
    }

    rV(cP, hw, 0, hw, hh, false);
}

function onRz(){
    var w=window.innerWidth, h=window.innerHeight, a=w/h;
    renderer.setSize(w,h);
    var hs=fS/2;
    [c111,c121,c101].forEach(function(cam){
        cam.left=-hs*a; cam.right=hs*a; cam.top=hs; cam.bottom=-hs;
        cam.updateProjectionMatrix();
    });
    cP.aspect=a; cP.updateProjectionMatrix();
    needsStaticUpdate=true;
}

/* ================================================================
   FIELD SCALE — recompute peak when w changes
   ================================================================ */
function updateFieldScale(){
    var u = volMesh.material.uniforms;
    var p = particles[currentPartKey];
    var wNow = parseFloat(document.getElementById('ws').value);
    var w2now = wNow * wNow;
    var ft = u.uFT.value;
    var nc = u.uNC.value;
    var peakField = 0.001;
    if(ft > 1.5){
        /* Analytic microrotation: peak of Y₂⁰ × (r²/σ²)exp(-r²/σ²)
           = 2.0 × (1/e) = 0.7358 at r = σ = √2 along the quadrupole axis. */
        peakField = 2.0 / Math.E;
    } else if(ft > 0.5 && nc > 0){
        var uNP = u.uNP.value;
        var uNS = u.uNS.value;
        var testPts = [new THREE.Vector3(0,0,0)];
        for(var i=0;i<nc;i++) testPts.push(uNP[i].clone());
        for(var ti=0;ti<testPts.length;ti++){
            var tp = testPts[ti];
            var f = 0;
            for(var j=0;j<nc;j++){
                var dx = tp.x - uNP[j].x, dy = tp.y - uNP[j].y, dz = tp.z - uNP[j].z;
                f += uNS[j] / (1.0 + (dx*dx+dy*dy+dz*dz)/w2now);
            }
            f = f / nc;
            if(Math.abs(f) > peakField) peakField = Math.abs(f);
        }
    } else {
        var ct = (p.coreType !== undefined) ? p.coreType : 0;
        var nSeg = u.uNSeg.value;
        if(ct < 0.5){
            peakField = 1.0 / (2.0 * wNow * Math.max(nSeg,1));
        } else {
            peakField = 1.0 / (8.0 * wNow * Math.max(nSeg,1));
        }
    }
    if(peakField < 0.001) peakField = 0.1;
    u.uFieldScale.value = 1.0 / peakField;
}

/* ================================================================
   EXPORT
   ================================================================ */
function exportHR(){
    var btn=document.getElementById('xb');
    btn.textContent='Rendering...'; btn.disabled=true;
    stU.value=EXPORT_STEPS;

    var cbW=120;  /* colourbar strip width */
    var pW=1200,pH=1200,tW=cbW+pW*4,tH=pH;
    var hi=new THREE.WebGLRenderer({antialias:true,preserveDrawingBuffer:true});
    hi.setSize(pW*4,tH); hi.setPixelRatio(1);
    hi.setScissorTest(true); hi.setClearColor(0xffffff,1);

    var pa=pW/pH,hs=fS/2;
    var cams=[c111,c121,c101,cP];
    var oC=[c111,c121,c101];

    var saved=oC.map(function(cam){return{l:cam.left,r:cam.right,t:cam.top,b:cam.bottom};});
    oC.forEach(function(cam){cam.left=-hs*pa;cam.right=hs*pa;cam.top=hs;cam.bottom=-hs;cam.updateProjectionMatrix();});
    var spa=cP.aspect;cP.aspect=pa;cP.updateProjectionMatrix();

    for(var i=0;i<4;i++){
        hi.setViewport(i*pW,0,pW,pH);
        hi.setScissor(i*pW,0,pW,pH);
        updateViewState(cams[i]);
        hi.render(scene,cams[i]);
        /* Proton charge radius overlay (ortho panels only) */
        if(i < 3 && overlayScene && document.getElementById('rpToggle').checked){
            overlayCam.left=-hs*pa; overlayCam.right=hs*pa;
            overlayCam.top=hs; overlayCam.bottom=-hs;
            overlayCam.updateProjectionMatrix();
            scaleRing.position.set(0, 0, 0);
            hi.autoClear=false; hi.clearDepth();
            hi.render(overlayScene, overlayCam);
            hi.autoClear=true;
        }
    }

    oC.forEach(function(cam,ci){cam.left=saved[ci].l;cam.right=saved[ci].r;cam.top=saved[ci].t;cam.bottom=saved[ci].b;cam.updateProjectionMatrix();});
    cP.aspect=spa;cP.updateProjectionMatrix();
    stU.value=LIVE_STEPS;

    /* ── Compose final image: colourbar strip + 4 panels ── */
    var fc=document.createElement('canvas');fc.width=tW;fc.height=tH;
    var ctx=fc.getContext('2d');
    ctx.fillStyle='#ffffff';
    ctx.fillRect(0,0,tW,tH);

    /* Draw colourbar strip on the left */
    var mode=mU?mU.value:0;
    var isEnergy=(mode>2.5 && mode<3.5), isCosserat=(mode>3.5 && mode<4.5), isDisp=(mode>4.5 && mode<5.5), isOverlap=(mode>5.5), isStrain=(mode<0.5);
    var cbX=20, cbY=100, cbH=tH-240, cbBarW=30;
    for(var y=0;y<cbH;y++){
        var t=1.0-y/cbH;
        var rgb=(isEnergy||isCosserat) ? hotJS(t) : jetJS(t);
        ctx.fillStyle='rgb('+Math.round(rgb[0]*255)+','+Math.round(rgb[1]*255)+','+Math.round(rgb[2]*255)+')';
        ctx.fillRect(cbX,cbY+y,cbBarW,1);
    }
    ctx.strokeStyle='#666'; ctx.lineWidth=1;
    ctx.strokeRect(cbX,cbY,cbBarW,cbH);

    /* Colourbar labels */
    var wSlider=parseFloat(document.getElementById('ws').value);
    var eps0=(1.0/(2.0*Math.PI*wSlider));
    ctx.font='22px serif'; ctx.fillStyle='#1A1A1A'; ctx.textAlign='left';
    if(isOverlap){
        ctx.fillText('+ε·γ', cbX+cbBarW+6, cbY+16);
        ctx.fillText('−ε·γ', cbX+cbBarW+6, cbY+cbH+6);
    } else if(isDisp){
        ctx.fillText('+b/2', cbX+cbBarW+6, cbY+16);
        ctx.fillText('−b/2', cbX+cbBarW+6, cbY+cbH+6);
    } else if(isCosserat){
        ctx.fillText('U_Coss', cbX+cbBarW+6, cbY+16);
        ctx.fillText('0', cbX+cbBarW+6, cbY+cbH+6);
    } else if(isEnergy){
        ctx.fillText('ε²=' + (eps0*eps0/4).toFixed(3), cbX+cbBarW+6, cbY+16);
        ctx.fillText('0', cbX+cbBarW+6, cbY+cbH+6);
    } else if(isStrain){
        ctx.fillText('+ε₀='+(eps0/2).toFixed(2), cbX+cbBarW+6, cbY+16);
        ctx.fillText('0', cbX+cbBarW+6, cbY+cbH/2+6);
        ctx.fillText('−'+(eps0/2).toFixed(2), cbX+cbBarW+6, cbY+cbH+6);
    } else {
        ctx.fillText('+', cbX+cbBarW+6, cbY+16);
        ctx.fillText('0', cbX+cbBarW+6, cbY+cbH/2+6);
        ctx.fillText('−', cbX+cbBarW+6, cbY+cbH+6);
    }
    /* Colourbar title */
    ctx.save();
    ctx.font='bold 24px serif';
    ctx.translate(cbX-6, cbY+cbH/2);
    ctx.rotate(-Math.PI/2);
    ctx.textAlign='center';
    var fN=document.getElementById('fs').value;
    var cbTitle = (fN==='strain') ? 'Strain ε/ε₀' : (fN==='overlap') ? 'Photon overlap ε·γ' : (fN==='displacement') ? 'Displacement u/b' : (fN==='strainenergy') ? 'Strain energy (ε/ε₀)²' : (fN==='cosserat') ? 'Cosserat U = μ_tot ε² + γ κ²' : (fN==='coulomb') ? 'Coulomb φ' : (fN==='coulomb2') ? 'Coulomb φ²' : '';
    ctx.fillText(cbTitle, 0, 0);
    ctx.restore();

    /* PN core width label */
    ctx.font='18px sans-serif'; ctx.textAlign='left';
    ctx.fillText('w/ℓ = '+wSlider, cbX, tH-40);

    /* Draw the 4 rendered panels offset by cbW */
    ctx.drawImage(hi.domElement, cbW, 0);

    /* View labels */
    ctx.font='bold 32px sans-serif';ctx.fillStyle='#1A1A1A';ctx.textAlign='center';ctx.textBaseline='bottom';
    ['[111]','[12̄1]','[101̄]','Perspective'].forEach(function(lbl,i){ctx.fillText(lbl,cbW+i*pW+pW/2,tH-16);});

    var pN=document.getElementById('ps').value;
    var wVal=document.getElementById('ws').value;
    fc.toBlob(function(blob){
        var aa=document.createElement('a');aa.href=URL.createObjectURL(blob);
        aa.download=fN+'_'+pN+'_w'+wVal+'_600dpi.png';
        document.body.appendChild(aa);aa.click();document.body.removeChild(aa);
        hi.dispose();
        btn.textContent='Export 600 DPI';btn.disabled=false;
    },'image/png');
}
</script>
